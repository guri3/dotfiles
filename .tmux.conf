# デフォルトシェル
#----------------------------------------------------
set -g default-shell /opt/homebrew/bin/zsh

# オプション
#----------------------------------------------------
# Escキーの速さを変更
set -sg escape-time 10
# スクロールバックバッファを拡大（デフォルト: 2,000行）
set -g history-limit 10000
# electron
# set-option -g default-command "reattach-to-user-namespace -l zsh"
# 新規ウィンドウを作成した際にカレントディレクトリを保存する
bind c new-window -c "#{pane_current_path}"


# コピーモード
#----------------------------------------------------
# Vi キーバインド
set-window-option -g mode-keys vi
# Prefix+v でコピーモード開始
bind-key v copy-mode \; display "Copy mode!"
# Prefix+Enter/y でコピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"


# 画面表示
#----------------------------------------------------
# ウィンドウのインデックスを1から始める
set -g base-index 1
# ペインのインデックスを1から始める
setw -g pane-base-index 1
# ウィンドウを閉じた際に番号を自動で詰め直す
set -g renumber-windows on
# ペインボーダーの色を設定する
set-option -g pane-border-style fg="#555555"
set-option -g pane-active-border-style fg="#7cd2f7"
# 非アクティブペインを暗くして区別する
set-option -g window-style 'bg=#2a2a2a,fg=#888888'
set-option -g window-active-style 'bg=terminal,fg=terminal'
# Message text
set-option -g message-style fg="colour166",bg="default"
# ステータスバーをトップに配置する
set-option -g status-position bottom
set-option -g default-terminal "screen-256color"
# ステータスバーの色を設定
set-option -g status-style bg="#333333",fg="yellow"
# ウィンドウリストの設定
set-window-option -g window-status-style "default"
set-window-option -g window-status-format '#[fg=#4a4a4a,bg=#333333]#[fg=#888888,bg=#4a4a4a] #(~/.config/tmux/pane-icon.sh #{pane_id})#[fg=#888888]#{b:pane_current_path} #[fg=#4a4a4a,bg=#333333]'
set-window-option -g window-status-current-style "default"
set-window-option -g window-status-current-format '#[fg=#3a7ca5,bg=#333333]#[fg=#ffffff,bg=#3a7ca5] #(~/.config/tmux/pane-icon.sh #{pane_id})#[fg=#ffffff]#{b:pane_current_path} #[fg=#3a7ca5,bg=#333333]'
# 左右のステータスバーの長さを決定する
set-option -g status-left-length 120
set-option -g status-right-length 120
# ステータスバーの表示
# 最左に表示
set-option -g status-left '#[fg=#ffffff,bg=#3a7ca5] #S #[fg=#cccccc,bg=#4a4a4a] #I #[fg=#cccccc,bg=#555555] #P #[fg=#555555,bg=#333333]#[default]'
# 最右に表示
set-option -g status-right '#[fg=#4a4a4a,bg=#333333]#[fg=#cccccc,bg=#4a4a4a] #{s|#{HOME}|~|:pane_current_path} #{?#(cd #{pane_current_path} && git branch --show-current 2>/dev/null),(#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)),} #[default]'
# Enable visual notification
set-window-option -g monitor-activity on
set-window-option -g window-status-activity-style fg="colour144",bg="default"
# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1
# センタライズ（主にウィンドウ番号など）
set-option -g status-justify "absolute-centre"

# キーバインド
#----------------------------------------------------
# prefixキーをC-jに変更する
set -g prefix C-j
unbind -n C-b
# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# ペイン分割
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
# 画面サイズの調整
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
# ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# fzfのCtrl-nが奪われるので無効化
unbind -n C-n
# Claude CodeのCtrl-oが奪われるので無効化
unbind -n C-o
# Claude CodeなどのShift+Enter改行対応
bind -n S-Enter send-keys Escape "[13;2u"

# プラグイン
#----------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @sidebar_width 35
set -g @plugin 'hiroppy/tmux-agent-sidebar'
run '~/.tmux/plugins/tpm/tpm'
